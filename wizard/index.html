<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trellis Setup Wizard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wizard-container">
        <!-- Header -->
        <header class="wizard-header">
            <div class="logo">
                <svg viewBox="0 0 32 32" width="32" height="32" fill="none">
                    <rect width="32" height="32" rx="8" fill="#4f6d5e"/>
                    <path d="M8 12h16M12 8v16M20 8v16" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="logo-text">Trellis</span>
            </div>
            <span class="wizard-label">Setup Wizard</span>
        </header>

        <!-- Progress bar -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="step-indicators" id="stepIndicators"></div>

        <!-- Step content area -->
        <main class="step-content" id="stepContent"></main>

        <!-- Navigation -->
        <footer class="wizard-footer">
            <button class="btn btn-secondary" id="prevBtn" onclick="prevStep()">Back</button>
            <div class="step-counter" id="stepCounter"></div>
            <button class="btn btn-primary" id="nextBtn" onclick="nextStep()">Continue</button>
        </footer>
    </div>

    <script src="wizard.js"></script>
</body>
</html>
