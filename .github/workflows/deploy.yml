name: Deploy Services

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  AR_REPO: ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/cloud-run-source-deploy

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      relay: ${{ steps.changes.outputs.relay }}
      frontend: ${{ steps.changes.outputs.frontend }}
      landing: ${{ steps.changes.outputs.landing }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'backend/api/**'
              - 'backend/shared/**'
            relay:
              - 'backend/relay/**'
              - 'backend/shared/**'
            frontend:
              - 'frontend/**'
            landing:
              - 'landing/**'

  deploy-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and push API image
        run: |
          docker build -f backend/api/Dockerfile -t $AR_REPO/trellis-api:${{ github.sha }} -t $AR_REPO/trellis-api:latest backend/
          docker push $AR_REPO/trellis-api --all-tags

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy trellis-api \
            --image $AR_REPO/trellis-api:${{ github.sha }} \
            --region $REGION \
            --project $PROJECT_ID \
            --quiet

  deploy-relay:
    needs: detect-changes
    if: needs.detect-changes.outputs.relay == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and push Relay image
        run: |
          docker build -f backend/relay/Dockerfile -t $AR_REPO/trellis-relay:${{ github.sha }} -t $AR_REPO/trellis-relay:latest backend/
          docker push $AR_REPO/trellis-relay --all-tags

      - name: Deploy Relay to Cloud Run
        run: |
          gcloud run deploy trellis-relay \
            --image $AR_REPO/trellis-relay:${{ github.sha }} \
            --region $REGION \
            --project $PROJECT_ID \
            --quiet

  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and push Frontend image
        run: |
          docker build \
            --build-arg VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }} \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN=${{ vars.GCP_PROJECT_ID }}.firebaseapp.com \
            --build-arg VITE_FIREBASE_PROJECT_ID=${{ vars.GCP_PROJECT_ID }} \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET=${{ vars.GCP_PROJECT_ID }}.firebasestorage.app \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }} \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-arg VITE_WS_URL=${{ secrets.VITE_WS_URL }} \
            -t $AR_REPO/trellis-frontend:${{ github.sha }} \
            -t $AR_REPO/trellis-frontend:latest \
            frontend/
          docker push $AR_REPO/trellis-frontend --all-tags

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy trellis-frontend \
            --image $AR_REPO/trellis-frontend:${{ github.sha }} \
            --region $REGION \
            --project $PROJECT_ID \
            --quiet

  deploy-landing:
    needs: detect-changes
    if: needs.detect-changes.outputs.landing == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: landing

      - name: Build landing page
        run: npm run build
        working-directory: landing

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          channelId: live
          projectId: ${{ vars.GCP_PROJECT_ID }}
